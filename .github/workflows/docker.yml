# Build the container on every push to main and publish it to GitHub Container
# Registry as ghcr.io/jrsphoto/adsbvue:latest (plus a version tag when a v* git
# tag is pushed). Multi-arch — amd64 + arm64 — so Raspberry Pi users can pull and
# run without building. Auth is the built-in Actions token; no secrets to manage.
name: docker

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU + buildx enable the arm64 half of the multi-arch build.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # latest tracks main; pushing a tag like v1.2 also publishes :1.2.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/adsbvue
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
